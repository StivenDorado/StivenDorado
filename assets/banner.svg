<svg width="100%" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
<defs>
  <clipPath id="gc"><ellipse cx="450" cy="140" rx="90" ry="90"/></clipPath>
  <linearGradient id="scanfade" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#050810"/>
    <stop offset="12%" stop-color="#050810" stop-opacity="0"/>
    <stop offset="88%" stop-color="#050810" stop-opacity="0"/>
    <stop offset="100%" stop-color="#050810"/>
  </linearGradient>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;family=Share+Tech+Mono&amp;display=swap');
    .title-text { font-family: 'Orbitron','Courier New',monospace; font-size: 42px; font-weight: 900; fill: #5a9aef; letter-spacing: 6px; }
    .sub-text   { font-family: 'Share Tech Mono','Courier New',monospace; font-size: 13px; fill: #2a5080; letter-spacing: 5px; }
    .scan-text  { font-family: 'Share Tech Mono','Courier New',monospace; font-size: 10px; fill: #1a3860; letter-spacing: 3px; }
    .grid-line  { stroke: #0d2040; stroke-width: 0.5; fill: none; }
    .orbit      { stroke: #1a3860; stroke-width: 0.8; fill: none; }
    .orbit-d    { stroke: #162840; stroke-width: 0.6; fill: none; stroke-dasharray: 4 6; }
    .cross      { stroke: #1a3060; stroke-width: 0.5; fill: none; }
    .dot-node   { fill: #3a7abf; }
    .dot-sm     { fill: #1a4070; }
    .bracket    { stroke: #1a4070; stroke-width: 1; fill: none; }
    .r1 { animation: spin1 10s linear infinite; transform-origin: 450px 140px; }
    .r2 { animation: spin2 16s linear infinite; transform-origin: 450px 140px; }
    .r3 { animation: spin3 24s linear infinite reverse; transform-origin: 450px 140px; }
    .pulse-ring { animation: pring 3s ease-in-out infinite; transform-origin: 450px 140px; }
    .blink1 { animation: blink 2.4s step-end infinite; }
    .blink2 { animation: blink 3.1s step-end 0.7s infinite; }
    .title-glow { animation: tglow 4s ease-in-out infinite; }
    @keyframes spin1  { to { transform: rotate(360deg);  } }
    @keyframes spin2  { to { transform: rotate(-360deg); } }
    @keyframes spin3  { to { transform: rotate(360deg);  } }
    @keyframes pring  { 0%,100%{opacity:0.3} 50%{opacity:1} }
    @keyframes blink  { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes tglow  { 0%,100%{fill:#4a8adf} 50%{fill:#7ab8ff} }
  </style>
</defs>
<rect width="900" height="280" fill="#050810"/>
